name: Build iOS MAUI

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - run: dotnet workload install maui

      - run: dotnet restore

      - run: dotnet publish -f net9.0-ios -c Release

      - uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: |
            **/bin/Release/**/*
